version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: grc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-grcdb}
      POSTGRES_USER:     ${POSTGRES_USER:-grcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grcpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grcuser} -d ${POSTGRES_DB:-grcdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grc_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql+asyncpg://${POSTGRES_USER:-grcuser}:${POSTGRES_PASSWORD:-grcpassword}@db:5432/${POSTGRES_DB:-grcdb}
      REDIS_URL:     redis://redis:6379
      SECRET_KEY:    ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG:         ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── pgAdmin (optional DB GUI) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@grc.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: grc_network
